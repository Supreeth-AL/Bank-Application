<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Amount Page</title>
    <style>
        body {
            /* background-color: rgba(208, 237, 226, 0.912); */
            background-color: rgb(189, 238, 248);
        }

        .headingofbank {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border-style: outset;
            border-radius: 7px;
            height: 37px;
            padding: 0.2%;
            background-color: rgba(108, 199, 241, 0.912);
        }

        .welcome {
            margin-top: -2%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: underline;
        }

        #money-transfer {
            display: flex;
            float: right;
            width: 40%;
            margin-right: 10%;
            margin-top: -2%;
            border-radius: 5%;
        }

        .money-transfer-page{
            display: flex;
        }

        .money-transfer-form{
            bottom: 10%;
            margin-left: 5%;
        }

        .money-transfer-page{
            margin-top: 3%;
            margin-left: 10%;
        }
    </style>

</head>

<body>

    <h2 class="headingofbank">ABC Bank</h2>

    <div class="welcome">
        <h2>Please enter the amount To be Transfered</h2>
    </div>

    <div class="money-transfer-page">
        <div class="money-transfer-form">
            <form action="Transfer">
                <label >Accno :</label> <br>
                <input type="text" name="raccno"> <br> <br>

                <label >amount :</label><br>
                <input type="text" name="amt"> <br> <br> <br>

                <input id="submit" type="submit" />
                <button id="home" type="button" onclick="location.href='Home.html'">home</button>

            </form>

        </div>
        <div>
            <img id="money-transfer" src="image/money-transfer.png" alt="bankpic">
        </div>
    </div>

</body>

</html>
